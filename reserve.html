<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご予約 | 中華食堂 浅見</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-50">
    <header class="fixed w-full z-50 glass-header border-b border-stone-200">
        <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black tracking-tighter text-red-700">中華食堂 浅見</a>
            <div class="hidden md:flex gap-8 font-medium text-sm tracking-widest uppercase">
                <a href="index.html" class="hover:text-red-600 transition">Home</a>
                <a href="menu.html" class="hover:text-red-600 transition">Menu</a>
                <a href="access.html" class="hover:text-red-600 transition">Access</a>
                <a href="reserve.html" class="text-red-600">Reservation</a>
            </div>
        </nav>
    </header>

    <main class="pt-32 pb-24">
        <section class="max-w-4xl mx-auto px-6">
            <div class="text-center mb-16">
                <h1 class="text-5xl font-black tracking-tighter mb-4">ご予約</h1>
                <p class="text-stone-500 leading-relaxed max-w-lg mx-auto">
                    最高の状態でお料理を楽しんでいただくため、<br>事前のご予約をお勧めしております。
                </p>
            </div>

            <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-stone-100">
                <div class="p-10 md:p-16">
                    <form action="#" class="space-y-8">
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">お名前</label>
                                <input type="text" placeholder="加古川 太郎" class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">電話番号</label>
                                <input type="tel" placeholder="090-0000-0000" class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent">
                            </div>
                        </div>

                        <div class="grid md:grid-cols-3 gap-8">
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">予約日</label>
                                <input type="date" class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">時間</label>
                                <select class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent">
                                    <option>17:30</option>
                                    <option>18:00</option>
                                    <option>18:30</option>
                                    <option>19:00</option>
                                    <option>19:30</option>
                                    <option>20:00</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">人数</label>
                                <input type="number" min="1" max="20" placeholder="2" class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold tracking-widest text-stone-400 uppercase">ご要望（アレルギー等）</label>
                            <textarea rows="4" placeholder="メッセージがございましたらご記入ください" class="border-b-2 border-stone-200 py-3 focus:border-red-700 outline-none transition bg-transparent resize-none"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-red-700 text-white py-5 rounded-lg font-bold text-lg hover:bg-red-800 transition-all shadow-lg hover:shadow-red-700/20">
                            予約をリクエストする
                        </button>
                    </form>
                    <p class="mt-8 text-center text-sm text-stone-400">
                        ※お急ぎの場合はお電話（079-XXX-XXXX）にてご連絡ください。
                    </p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
